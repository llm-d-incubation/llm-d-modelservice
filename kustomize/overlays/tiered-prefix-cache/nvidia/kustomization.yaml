apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: default

resources:
  - ../../../accelerators/nvidia

configMapGenerator:
  - name: model-config
    behavior: merge
    literals:
      - modelName=Qwen/Qwen3-32B
      - modelUri=hf://Qwen/Qwen3-32B
      - modelSize=70Gi

patches:
  # Enable decode deployment with prefix cache offloading
  - target:
      kind: Deployment
      name: modelservice-decode
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 8
      - op: add
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "128Gi"
      - op: add
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "32"
      - op: add
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "128Gi"
      - op: add
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "32"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/nvidia.com~1gpu
        value: "2"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/nvidia.com~1gpu
        value: "2"
