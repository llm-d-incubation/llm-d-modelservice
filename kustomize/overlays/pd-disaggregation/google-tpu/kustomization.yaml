apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: default

resources:
  - ../../../accelerators/google-tpu

configMapGenerator:
  - name: model-config
    behavior: merge
    literals:
      - modelName=meta-llama/Llama-3.3-70B-Instruct
      - modelUri=hf://meta-llama/Llama-3.3-70B-Instruct
      - modelSize=150Gi

patches:
  # Enable and configure decode deployment
  - target:
      kind: Deployment
      name: modelservice-decode
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
      - op: add
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "200Gi"
      - op: add
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "32"
      - op: add
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "200Gi"
      - op: add
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "32"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/google.com~1tpu
        value: "8"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/google.com~1tpu
        value: "8"

  # Enable and configure prefill deployment
  - target:
      kind: Deployment
      name: modelservice-prefill
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: add
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "200Gi"
      - op: add
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "32"
      - op: add
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "200Gi"
      - op: add
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "32"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/google.com~1tpu
        value: "8"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/google.com~1tpu
        value: "8"

  # Routing proxy init containers
  - path: patches/decode-init-container.yaml
  - path: patches/prefill-init-container.yaml
