apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: default

resources:
  - ../../../accelerators/intel-xe

configMapGenerator:
  - name: model-config
    behavior: merge
    literals:
      - modelName=Qwen/Qwen3-32B
      - modelUri=hf://Qwen/Qwen3-32B
      - modelSize=70Gi

patches:
  # Enable decode deployment with 8 replicas (2 GPUs each)
  - target:
      kind: Deployment
      name: modelservice-decode
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 8
      - op: add
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "64Gi"
      - op: add
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "16"
      - op: add
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "64Gi"
      - op: add
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "16"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/gpu.intel.com~1xe
        value: "2"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/gpu.intel.com~1xe
        value: "2"
